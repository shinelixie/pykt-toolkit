program: wandb_mockt_train.py
method: bayes
metric:
    goal: maximize
    name: validauc
parameters:
    model_name:
        values: ["mockt"]
    dataset_name:
        values: ["xes"]
    emb_type:
        values: ["qid_conv_ker_noexp"]
    save_dir:
        values: ["models/mockt_tiaocan"]
    d_model:
        values: [64,128, 256]
    d_ff:
        values: [64,128, 256]
    dropout:
        values: [0.05, 0.1, 0.3]
    learning_rate:
        values: [1e-3, 1e-4]
    num_attn_heads:
        values: [4, 8]
    n_blocks:
        values: [1, 2, 4]
    kernel_size:
        values: [4,8,16,32]
    sequence1:
        values: [0, 20, 50, 70, 90]
    sequence2:
        values: [130, 150, 170, 200]
    seed:
        values: [42, 3407]
    fold:
        values: [0, 1, 2, 3, 4]

